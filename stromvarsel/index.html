<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strømvarsel Oslofjorden</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; overflow: hidden; }
  body, .wrap { width: 100vw; height: 100vh; }
  .slide-img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .top-left {
    position: absolute;
    top: 16px; left: 16px;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .area-wrap, .wrap { position: relative; }
  .dropdown {
    position: absolute;
    top: 0; left: 0;
    background: rgba(240,240,240,0.95);
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 6px;
    overflow: hidden;
    z-index: 20;
    display: none;
    min-width: 180px;
    backdrop-filter: blur(6px);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 8px 12px;
    color: #111;
    font-size: 14px;
    cursor: pointer;
    font-family: sans-serif;
  }
  .dropdown-item:hover { background: rgba(0,0,0,0.08); }
  .dropdown-item.active { background: rgba(0,0,0,0.13); font-weight: 500; }

  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 24px;
    background: linear-gradient(transparent, rgba(255,255,255,0.7));
    display: flex; align-items: center; gap: 12px;
  }
  .btn {
    background: rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 6px; color: #111; cursor: pointer;
    font-size: 14px; padding: 4px 12px; white-space: nowrap;
    font-family: sans-serif; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:hover { background: rgba(0,0,0,0.22); }
  .btn:active { transform: scale(0.97); }
  .area-btn {
    padding: 6px 12px;
    backdrop-filter: blur(6px);
    gap: 6px;
  }
  .area-btn.open { visibility: hidden; }
  .area-btn, .info-btn { text-decoration: none; }

  #time-slider {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 5px; border-radius: 3px;
    background: rgba(0,0,0,0.15);
    cursor: pointer; outline: none;
  }
  #time-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.6);
    cursor: grab;
  }
  #time-slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.6);
    cursor: grab;
  }
</style>
</head>
<body>
<div class="wrap">
  <img class="slide-img" id="slide-img" src="" alt="Strømkart" />

  <div class="top-left">
    <a class="btn info-btn" target="_blank"
       title="Strømvarselet er hentet fra FjordOs"
       href="https://fjordos.usn.no/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></a>
    <div class="area-wrap">
      <button class="btn area-btn" id="area-btn">
        <span id="area-label">Drammensfjorden</span>
        <span>&#9662;</span>
      </button>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <div class="overlay">
    <button class="btn" id="btn-play"></button>
    <input type="range" id="time-slider" min="0" max="27" step="1" value="0" />
  </div>
</div>

<script>
  const BASE = 'https://projects.met.no/~nilsmk/';

  const areas = [
    { label: 'Hele fjorden', url: h => `${BASE}oslofjord/grafikk/ferder_hele__${h}_current` },
    { label: 'Indre fjord', url: h => `${BASE}oslofjord/grafikk/ferder1__${h}_current` },
    { label: 'Drøbak', url: h => `${BASE}oslofjord/grafikk/ferder2__${h}_current` },
    { label: 'Midtre fjord', url: h => `${BASE}oslofjord/grafikk/ferder3__${h}_current` },
    { label: 'Ytre fjord', url: h => `${BASE}oslofjord/grafikk/ferder4__${h}_current` },
    { label: 'Drammensfjorden', url: h => `${BASE}oslofjord/grafikk/drammen1__${h}_current` },
    { label: 'Hankø', url: h => `${BASE}hanko/hanko1_${h}_current` },
    { label: 'Hvaler', url: h => `${BASE}hvaler/hvaler1_${h}_current` },
  ];

  const hours = [];
  for (let h = 6; h <= 60; h += 2) hours.push(h);

  let currentArea = 5;
  let current = 0, playing = false, timer = null, speed = 750;
  let hourOffset = 0;

  const img = document.getElementById('slide-img');
  const btnPlay = document.getElementById('btn-play');
  const slider = document.getElementById('time-slider');
  const areaBtn = document.getElementById('area-btn');
  const areaLabel = document.getElementById('area-label');
  const dropdown = document.getElementById('dropdown');
  const iconPlay  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const iconStop = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

  function closestHourIndex() {
    const now = new Date();
    const h = now.getHours() + now.getMinutes() / 60;
    let best = 0, bestDiff = Infinity;
    hours.forEach((hh, i) => {
      const diff = Math.abs(hh - h);
      if (diff < bestDiff) { bestDiff = diff; best = i; }
    });
    return best;
  }

  function buildDropdown() {
    dropdown.innerHTML = '';
    areas.forEach((area, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item' + (i === currentArea ? ' active' : '');
      item.textContent = area.label;
      item.addEventListener('click', () => {
        currentArea = i;
        areaLabel.textContent = area.label;
        dropdown.classList.remove('open');
        goto(current);
        buildDropdown();
      });
      dropdown.appendChild(item);
    });
  }

  areaBtn.addEventListener('click', e => {
    e.stopPropagation();
    const open = dropdown.classList.toggle('open');
    areaBtn.classList.toggle('open', open);
  });
  document.addEventListener('click', () => {
    dropdown.classList.remove('open');
    areaBtn.classList.remove('open');
  });

  async function detectOffset() {
    try {
      const probe = areas[currentArea].url(hours[0]);
      const res = await fetch(probe, { method: 'HEAD' });
      const lastMod = res.headers.get('Last-Modified');
      if (lastMod) {
        const imgDate = new Date(lastMod).toDateString();
        const today   = new Date().toDateString();
        if (imgDate !== today) hourOffset = 24;
      }
    } catch (e) {}
    buildDropdown();
    btnPlay.innerHTML = iconPlay;
    const startIdx = closestHourIndex();
    goto(startIdx);
  }

  function goto(idx) {
    const offsetIdx = Math.round(hourOffset / 2);
    current = Math.max(0, Math.min(idx, hours.length - 1));
    img.src = areas[currentArea].url(hours[current + offsetIdx]);
    slider.value = current;
  }

  function startPlay() {
    playing = true;
    btnPlay.innerHTML = iconStop;
    timer = setInterval(() => goto(current >= hours.length - 1 ? 0 : current + 1), speed);
  }

  function stopPlay() {
    playing = false;
    btnPlay.innerHTML = iconPlay;
    clearInterval(timer);
  }

  btnPlay.addEventListener('click', () => playing ? stopPlay() : startPlay());

  slider.addEventListener('input', () => {
    stopPlay();
    goto(parseInt(slider.value));
  });

  detectOffset();
</script>
</body>
</html>
