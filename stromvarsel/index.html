<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strømvarsel Oslofjorden</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; overflow: hidden; }
  body, .wrap { width: 100vw; height: 100vh; }
  .slide-img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .top-left {
    position: absolute;
    top: 16px; left: 16px;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .area-wrap, .wrap { position: relative; }
  .dropdown {
    position: absolute;
    top: 0; left: 0;
    background: rgba(240,240,240,0.95);
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 6px;
    overflow: hidden;
    z-index: 20;
    display: none;
    min-width: 180px;
    backdrop-filter: blur(6px);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 8px 12px;
    color: #111;
    font-size: 14px;
    cursor: pointer;
    font-family: sans-serif;
  }
  .dropdown-item:hover { background: rgba(0,0,0,0.08); }
  .dropdown-item.active { background: rgba(0,0,0,0.13); font-weight: 500; }

  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 24px;
    background: linear-gradient(transparent, rgba(255,255,255,0.7));
    display: flex; align-items: center; gap: 12px;
  }
  .btn {
    background: rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 6px; color: #111; cursor: pointer;
    font-size: 14px; padding: 4px 12px; white-space: nowrap;
    font-family: sans-serif; flex: 0 0 auto;
    display: flex; align-items: center; gap: 6px;
    justify-content: center;
  }
  .btn:hover { background: rgba(0,0,0,0.22); }
  .btn:active { transform: scale(0.97); }
  a { text-decoration: none; }
  .area-btn {
    padding: 6px 12px;
    backdrop-filter: blur(6px);
  }
  .area-btn.open { visibility: hidden; }
  .top-right {
    position: absolute;
    top: 16px; right: 16px;
    display: flex; gap: 8px;
    flex-direction: column;
    align-items: flex-end;
    z-index: 10;
  }

  #time-slider {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 5px; border-radius: 3px;
    background: rgba(0,0,0,0.15);
    cursor: pointer; outline: none;
  }
  #time-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.6);
    cursor: grab;
  }
  #time-slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.6);
    cursor: grab;
  }
</style>
</head>
<body>
<div class="wrap">
  <img class="slide-img" id="slide-img" src="" alt="Strømkart" />

  <div class="top-left">
    <a class="btn info-btn" target="_blank"
       title="Strømvarselet er hentet fra FjordOs"
       href="https://fjordos.usn.no/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></a>
    <div class="area-wrap">
      <button class="btn area-btn" id="area-btn">
        <span id="area-label">Drammensfjorden</span>
        <span>&#9662;</span>
      </button>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <div class="top-right">
    <a class="btn" id="svelvik-btn" target="_blank"
       title="Vannføring i Svelvikstrømmen er hentet fra Kystverket"
       href="https://mobvaer.kystverket.no/svelvikstrommen/"></a>
    <a class="btn" id="tide-btn" target="_blank"
       title="Vannstand og tidevann er hentet fra Kartverket"
       href="https://kartverket.no/til-sjos/se-havniva/resultat?id=124591&location=Svelvik"></a>
  </div>

  <div class="overlay">
    <button class="btn" id="btn-play"></button>
    <input type="range" id="time-slider" min="0" max="27" step="1" value="0" />
  </div>
</div>

<script>
  const BASE = 'https://projects.met.no/~nilsmk/oslofjord/grafikk';

  const areas = [
    { label: 'Hele fjorden', url: h => `${BASE}/ferder_hele__${h}_current` },
    { label: 'Indre fjord', url: h => `${BASE}/ferder1__${h}_current` },
    { label: 'Drøbak', url: h => `${BASE}/ferder2__${h}_current` },
    { label: 'Midtre fjord', url: h => `${BASE}/ferder3__${h}_current` },
    { label: 'Ytre fjord', url: h => `${BASE}/ferder4__${h}_current` },
    { label: 'Drammensfjorden', url: h => `${BASE}/drammen1__${h}_current` },
    { label: 'Hankø', url: h => `${BASE}/hanko1_${h}_current` },
    { label: 'Hvaler', url: h => `${BASE}/hvaler1_${h}_current` },
    { label: 'Arendal', url: h => `${BASE}/arendal1_${h}_current` },
  ];

  const hours = [];
  for (let h = 6; h <= 60; h += 2) hours.push(h);

  let currentArea = 5;
  let current = 0, playing = false, timer = null, speed = 750;

  const img = document.getElementById('slide-img');
  const btnPlay = document.getElementById('btn-play');
  const slider = document.getElementById('time-slider');
  const areaBtn = document.getElementById('area-btn');
  const areaLabel = document.getElementById('area-label');
  const dropdown = document.getElementById('dropdown');
  const iconPlay  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const iconStop = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

  function closestHourIndex() {
    const h = new Date().getUTCHours() + new Date().getUTCMinutes() / 60;
    return hours.reduce((best, hh, i) =>
      Math.abs(hh - h) < Math.abs(hours[best] - h) ? i : best, 0);
  }

  function buildDropdown() {
    dropdown.innerHTML = '';
    areas.forEach((area, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item' + (i === currentArea ? ' active' : '');
      item.textContent = area.label;
      item.addEventListener('click', () => {
        currentArea = i;
        areaLabel.textContent = area.label;
        dropdown.classList.remove('open');
        goto(current);
        buildDropdown();
      });
      dropdown.appendChild(item);
    });
  }

  areaBtn.addEventListener('click', e => {
    e.stopPropagation();
    const open = dropdown.classList.toggle('open');
    areaBtn.classList.toggle('open', open);
  });
  document.addEventListener('click', () => {
    dropdown.classList.remove('open');
    areaBtn.classList.remove('open');
  });

  function detectOffset() {
    const updateTime = 9.3;
    offset = new Date().getUTCHours() < updateTime ? 24/2 : 0;
    buildDropdown();
    btnPlay.innerHTML = iconPlay;
    goto(closestHourIndex() + offset);
  }

  function goto(idx) {
    current = Math.max(0, Math.min(idx, hours.length - 1));
    img.src = areas[currentArea].url(hours[current]);
    slider.value = current;
    updateSvelvikVisibility();
  }

  const svelvikBtn = document.getElementById('svelvik-btn');
  const tideBtn = document.getElementById('tide-btn');

  function updateSvelvikVisibility() {
    if (areas[currentArea].label === 'Drammensfjorden') {
      svelvikBtn.style.display = 'flex';
      fetchSvelvik();
      tideBtn.style.display = 'flex';
      fetchTide();
    } else {
      svelvikBtn.style.display = 'none';
      tideBtn.style.display = 'none';
    }
  }

  function meanCurrent(magnitudes, directions) {
    if (magnitudes.length !== directions.length || magnitudes.length === 0)
      return [undefined, undefined];
    let meanX = 0, meanY = 0;
    for (let i = 0; i < magnitudes.length; i++) {
      if (isNaN(magnitudes[i]) || magnitudes[i] === null ||
          isNaN(directions[i]) || directions[i] === null)
        return [undefined, undefined];
      const x = magnitudes[i] * Math.cos(directions[i] * Math.PI / 180);
      const y = magnitudes[i] * Math.sin(directions[i] * Math.PI / 180);
      meanX += (x - meanX) / (i + 1);
      meanY += (y - meanY) / (i + 1);
    }
    const mag = Math.sqrt(meanX * meanX + meanY * meanY);
    let dir = (Math.atan2(meanY, meanX) * 180 / Math.PI % 360 + 360) % 360;
    if (isNaN(mag) || mag < 0.001) dir = undefined;
    return [mag, dir];
  }

  async function fetchSvelvik() {
    const stationId  = '20665059';
    try {
      const SVELVIK_URL  = `https://mobvaer.kystverket.no/v4/stations/${stationId}/instantaneous/values`;
      const MAG_NOS = [29, 31, 33, 35, 37, 39, 41, 43];
      const DIR_NOS = [30, 32, 34, 36, 38, 40, 42, 44];
      const res  = await fetch(SVELVIK_URL);
      const data = await res.json();
      const mags = MAG_NOS.map(n => data[n]?.Value);
      const dirs = DIR_NOS.map(n => data[n]?.Value);
      const [mag, dir] = meanCurrent(mags, dirs);
      if (mag === undefined) return;
      const knop = (mag / 1000 * 1.94384).toFixed(1);
      /*
      const base = 'https://api.coastal-weather.kystverket.cloud/v1/stations';
      const [speedRes, dirRes] = await Promise.all([
        fetch(`${base}/${stationId}/current-speed`),
        fetch(`${base}/${stationId}/current-direction`)
      ]);
      const [speedData, dirData] = await Promise.all([
        speedRes.json(),
        dirRes.json()
      ]);
      const knop = speedData.value.toFixed(1);
      const dir = dirData.value;
      */
      svelvikBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="22" height="22"
             fill="currentColor" style="transform:rotate(${dir}deg);">
          <path d="M12 3.97C7.59 3.97 3.97 7.59 3.97 12C3.97 16.41 7.59 20.03 12 20.03C16.41 20.03 20.03 16.41 20.03 12C20.03 7.59 16.41 3.97 12 3.97M12 2C17.54 2 22 6.46 22 12C22 17.54 17.54 22 12 22C6.46 22 2 17.54 2 12C2 6.46 6.46 2 12 2M13 10.46H16L12 6.5L8 10.46H11V17.5H13" />
        </svg>
        <span>${knop} kn</span>`;
    } catch(e) {
      svelvikBtn.style.display = 'none';
    }
  }

  setInterval(() => {
    if (areas[currentArea].label === 'Drammensfjorden') fetchSvelvik();
  }, 60000);

  async function fetchTide() {
    const tideUrl = 'https://kartverket.no/api/vsl/tideLevels/?latitude=59.61368&longitude=10.40875&language=nb';
    const pathDown = 'M12 10L8 6H11V2H13V6H16L12 10';
    const pathUp = 'M12 2L16 6H13V10H11V6H8L12 2';
    try {
      const res = await fetch(tideUrl);
      const data = await res.json();
      const r = data.result;
      const level = Math.round(r.currentLevel.measurement.value);
      const unit = r.currentLevel.measurement.unit;
      const nextHigh = new Date(r.nextHighTide.dateTime);
      const nextLow = new Date(r.nextLowTide.dateTime);
      const rising = nextHigh < nextLow;
      const path = rising ? pathUp : pathDown;
      tideBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="22" height="22"
             fill="currentColor">
          <path d="${path}"/>
          <path d="M20 14H22V16H20C18.62 16 17.26 15.65 16 15C13.5 16.3 10.5 16.3 8 15C6.74 15.65 5.37 16 4 16H2V14H4C5.39 14 6.78 13.53 8 12.67C10.44 14.38 13.56 14.38 16 12.67C17.22 13.53 18.61 14 20 14M20 20H22V22H20C18.62 22 17.26 21.65 16 21C13.5 22.3 10.5 22.3 8 21C6.74 21.65 5.37 22 4 22H2V20H4C5.39 20 6.78 19.53 8 18.67C10.44 20.38 13.56 20.38 16 18.67C17.22 19.53 18.61 20 20 20"/>
        </svg>
        <span>${level} ${unit}</span>`;
      tideBtn.style.display = 'flex';
    } catch(e) {
      tideBtn.style.display = 'none';
    }
  }

  function togglePlay() {
    playing = !playing;
    btnPlay.innerHTML = playing ? iconStop : iconPlay;
    if (playing) {
      timer = setInterval(() => goto(current >= hours.length - 1 ? 0 : current + 1), speed);
    } else {
      clearInterval(timer);
    }
  }
  btnPlay.addEventListener('click', togglePlay);

  slider.addEventListener('input', () => {
    if (playing) togglePlay();
    goto(parseInt(slider.value));
  });

  detectOffset();
</script>
</body>
</html>
