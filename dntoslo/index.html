<!DOCTYPE html>
<html lang="no">
<head>
<title>Blåstier i Oslomarka (laget for DNT Oslo)</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<style type="text/css">html, body, #map { margin:0; padding:0; width:100%; height:100%; }</style>
<script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.js"></script>
<style type="text/css">
html, body, #map { margin:0; padding:0; width:100%; height:100%; }
#coords {
  position: absolute;
  top: 0.5em;
  right: 0.5em;
  background: rgba(255,255,255);
  border: 1px solid rgba(0,0,0,0.125);
  border-radius: 3px;
  padding: 4px 8px;
  font: 12px monospace;
  color: #666;
  z-index: 1000;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="coords">–</div>
<script>
function guidepostStyle(feature) {
  var op = feature.get('operator') || '';
  var foot = feature.get('foot');
  var hiking = feature.get('hiking');
  var ski = feature.get('ski');
  var bicycle = feature.get('bicycle');

  var fill = 'rgba(192,192,192,0.8)';
  var stroke = 'rgb(128,128,128)';

  if (foot && /kommune/i.test(op)) {
    fill = 'rgba(0,88,98,0.8)';
    stroke = 'rgb(185,245,183)';
  } else if (hiking && /DNT/i.test(op)) {
    fill = 'rgba(14,60,204,0.8)';
    stroke = 'rgb(127,195,216)';
  } else if (ski && /Skiforeningen/i.test(op)) {
    fill = 'rgba(221,88,64,0.8)';
  } else if (bicycle) {
    fill = 'rgba(155,27,48,0.8)';
    stroke = 'rgb(230,160,170)';
  }

  if (ski) stroke = 'rgb(249,0,37)';

  return new ol.style.Style({
    image: new ol.style.Circle({
      radius: 6,
      stroke: new ol.style.Stroke({ color: stroke, width: 1 }),
      fill: new ol.style.Fill({ color: fill })
    })
  });
}

var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>, ',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/topograatone/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: '<a href="https://osm.org/">OpenStreetMap contributors</a>',
        url: 'https://overpass-api.de/api/interpreter?data=node[information=guidepost](59.67,10.26,60.28,11.16);out;',
        format: new ol.format.OSMXML()
      }),
      style: guidepostStyle
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([10.72,59.99]),
    zoom: 11
  })
});

// Display MGRS coordinates at mouse position
var coords = document.getElementById('coords');
map.on('pointermove', function(evt) {
  var lonLat = ol.proj.toLonLat(evt.coordinate);
  var mgrsStr = window.mgrs.forward([lonLat[0], lonLat[1]], 4);
  var zone = mgrsStr.substring(0,3);
  var square = mgrsStr.substring(3,5);
  var easting = mgrsStr.substring(5,9);
  var northing = mgrsStr.substring(9,13);
  coords.textContent = zone + ' ' + square + ' ' + easting + ' ' + northing;
});

// Restore saved view
var savedCenter = localStorage.getItem('mapCenter');
var savedZoom = localStorage.getItem('mapZoom');
if (savedCenter && savedZoom) {
  map.getView().setCenter(JSON.parse(savedCenter));
  map.getView().setZoom(Number(savedZoom));
}
// Save view on change
map.getView().on('change', function() {
  localStorage.setItem('mapCenter', JSON.stringify(map.getView().getCenter()));
  localStorage.setItem('mapZoom', map.getView().getZoom());
});
</script>
</body>
</html>
