<!DOCTYPE html>
<html lang="no">
<html>
<head>
<title>Kart</title>
<meta charset="utf-8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="viewport" content="width=device-width, user-scalable=no"/>
<link rel="apple-touch-icon" sizes="180x180" href="osm-180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="osm-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="osm-16.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol-layerswitcher@4.1.2/dist/ol-layerswitcher.css" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/ol-layerswitcher@4.1.2/dist/ol-layerswitcher.js"></script>
<style type="text/css">
html, body, #map { margin:0; padding:0; width:100%; height:100%; }
.layer-switcher {
  top: 0.5em; z-index: 1000;
  font-family: sans-serif;
  border-width: 1px;
}
.layer-switcher button {
  height: 22px;
  width: 22px;
  background-color: white;
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="rgb(102,102,102)"><path d="M12,16L19.36,10.27L21,9L12,2L3,9L4.63,10.27M12,18.54L4.62,12.81L3,14.07L12,21.07L21,14.07L19.37,12.8L12,18.54Z"/></svg>');
  background-position: center center;
}
.layer-switcher.shown .panel {
  border-width: 1px;
  border-radius: 3px;
}
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = new ol.Map({
  target: 'map',
  controls: ol.control.defaults.defaults({ attribution: false }).extend([
    new ol.control.Attribution({ collapsible: true, collapsed: true })
  ]),
  layers: [
    new ol.layer.Tile({
      title: 'MTBmap.no',
      type: 'base',
      visible: false,
      source: new ol.source.XYZ({
        attributions: '<a href="https://mtbmap.no/">MTBmap.no</a>',
        url: 'https://mtbmap.no/tiles/osm/mtbmap/{z}/{x}/{y}.png'
      })
    }),
    new ol.layer.Tile({
      title: 'Kartverket topo',
      type: 'base',
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Tile({
      title: 'OpenStreetMap',
      type: 'base',
      visible: false,
      source: new ol.source.OSM()
    }),
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([8.5,61.0]),
    zoom: 7,
    enableRotation: false
  })
});

map.addControl(new LayerSwitcher());

// Show location
var geolocation = new ol.Geolocation({ projection: map.getView().getProjection() });

var accuracyFeature = new ol.Feature();
var positionFeature = new ol.Feature();
positionFeature.setStyle(new ol.style.Style({
  image: new ol.style.Circle({
    radius: 8,
    fill: new ol.style.Fill({ color: 'rgba(66,133,244,0.8)' }),
    stroke: new ol.style.Stroke({ color: 'rgb(255,255,255)', width: 2 })
  })
}));

geolocation.on('change:accuracyGeometry', function() {
  accuracyFeature.setGeometry(geolocation.getAccuracyGeometry());
});
geolocation.on('change:position', function() {
  var coords = geolocation.getPosition();
  positionFeature.setGeometry(coords ? new ol.geom.Point(coords) : null);
  if (!geolocation.hasCentered) {
    map.getView().setCenter(coords);
    geolocation.hasCentered = true;
  }
});

new ol.layer.Vector({
  map: map,
  source: new ol.source.Vector({ features: [accuracyFeature, positionFeature] })
});

var btn = document.createElement('button');
btn.title = 'Vis min posisjon';
btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 3L3 10.53V11.5L9.84 14.16L12.5 21H13.46L21 3Z"/></svg>';
btn.onclick = function() {
  var tracking = !geolocation.getTracking();
  geolocation.setTracking(tracking);
  geolocation.hasCentered = false;
  btn.style.color = tracking ? 'rgb(66,133,244)' : '';
};

var ctrl = document.createElement('div');
ctrl.className = 'ol-unselectable ol-control';
ctrl.style.cssText = 'top:2.25em; right:0.5em; height:24px; width:24px;';
ctrl.appendChild(btn);
map.addControl(new ol.control.Control({ element: ctrl }));

// Restore saved view
var savedCenter = localStorage.getItem('mapCenter');
var savedZoom = localStorage.getItem('mapZoom');
if (savedCenter && savedZoom) {
  map.getView().setCenter(JSON.parse(savedCenter));
  map.getView().setZoom(Number(savedZoom));
}
// Save view on change
map.getView().on('change', function() {
  localStorage.setItem('mapCenter', JSON.stringify(map.getView().getCenter()));
  localStorage.setItem('mapZoom', map.getView().getZoom());
});

</script>
</body>
</html>
