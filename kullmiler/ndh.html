<html>
<head>
<title>Kullmiler (NDH)</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css">
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.19.10/proj4.min.js"></script>
<style type="text/css">html, body, #map { margin:0; width:100%; height:100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
var styles = {
  'fixme': {
    'resurvey': new ol.style.Style({
      image: new ol.style.Circle({
        radius: 6,
        stroke: new ol.style.Stroke({color: '#ff0080', width: 1}),
        fill: new ol.style.Fill({color: 'rgba(245,0,128,0.2)'})
      })
    })
  },
  'historic': {
    'charcoal_pile': new ol.style.Style({
      image: new ol.style.Circle({
        radius: 6,
        stroke: new ol.style.Stroke({color: '#ff0080', width: 1}),
        fill: new ol.style.Fill({color: 'rgba(245,0,128,0.6)'})
      })
    })
  }
};
function pointStyleFunction(feature, resolution) {
  for (var key in styles) {
    var value = feature.get(key);
    if (value !== undefined) {
      for (var regexp in styles[key]) {
        if (new RegExp(regexp).test(value)) {
          return styles[key][regexp];
        }
      }
    }
  }
};

proj4.defs("EPSG:32633","+proj=utm +zone=33 +datum=WGS84 +units=m +no_defs");
var proj32633 = ol.proj.get('EPSG:32633');
proj32633.setExtent([234300, 6634760, 273000, 6690870]);
ol.proj.addProjection(proj32633);

var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/topograatone/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Tile({
      opacity: 0.75,
      source: new ol.source.TileWMS({
        attributions: '<a href="https://hoydedata.no/">hoydedata.no</a>',
        url: 'https://wms.geonorge.no/skwms1/wms.hoyde-dtm',
        params: {
          'LAYERS': 'DTM:skyggerelieff',
          'FORMAT': 'image/png',
        },
        projection: proj32633,
        extents: [234166.433002, 6629388.904332, 279329.199482, 6691457.645583],
        serverType: 'geoserver'
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: 'Jan Martin Larsen/<a href="https://www.abhistorielag.no/">Asker og Bærum historielag</a>, Vidar B. Gundersen, Bjørn Kåre Salvesen, <a href="https://www.baerum.kommune.no/">Bærum kommune</a> (<a href="https://data.norge.no/nlod/">NLOD</a>), Odd Joakim Olsen, <a href="https://kjerraten.no/kjerratmuseet/kolabonner/">Ingunn og Terje Jahr</a>, Gunnar Sannerud, Tore Vefferstad, Ståle Pinslie,',
        url: 'https://overpass-api.de/api/interpreter?data=node[historic=charcoal_pile](59.67,10.05,60.34,11.46);out;',
        format: new ol.format.OSMXML()
      }),
      style: pointStyleFunction
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([10.6,60.05]),
    zoom: 10,
    maxZoom: 18
  })
});
</script>
</body>
</html>
