<!DOCTYPE html>
<html lang="no">
<head>
<title>Veifar</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css">
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<style type="text/css">html, body, #map { margin:0; padding:0; width:100%; height:100%; }</style>
</head>
<body>
<div id="map"></div>
<script type="text/javascript">
var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      title: 'OSM turstier',
      type: 'base',
      visible: false,
      source: new ol.source.XYZ({
        attributions:
          'Kartdata: &copy; <a href="https://osm.org/">OpenStreetMap</a> bidragsytere, ' +
          'Driftet av <a href="https://safeconsulting.no/">Safe Computing AS</a>',
        url: 'http://{a-d}.tile.tusvik.no/tiles/hiking/{z}/{x}/{y}.png'
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([10.63,60.10]),
    zoom: 11
  })
});
</script>
</body>
</html>
