<!DOCTYPE html>
<html>
<head>
<title>Kitespots</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<style type="text/css">html, body, #map { margin:0; padding:0; width:100%; height:100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
var styles = {
  'sport': {
    'kitesurfing': new ol.style.Style({
      image: new ol.style.Circle({
        radius: 3,
        stroke: new ol.style.Stroke({color: '#e7001f', width: 1}),
        fill: new ol.style.Fill({color: '#e7001f'})
      })
    })
  },
  'piste:type': {
    'snowkite': new ol.style.Style({
      image: new ol.style.Circle({
        radius: 3,
        stroke: new ol.style.Stroke({color: '#3299CC', width: 1}),
        fill: new ol.style.Fill({color: '#3299CC'})
      })
    })
  },
  'weather:anemometer': {
    'yes': new ol.style.Style({
      image: new ol.style.Circle({
        radius: 7,
        stroke: new ol.style.Stroke({color: '#008b12', width: 2}),
        fill: new ol.style.Fill({color: 'rgba(0,139,18,.4)'})
      })
    })
  }
};
function pointStyleFunction(feature) {
  for (var key in styles) {
    var value = feature.get(key);
    if (value !== undefined) {
      for (var regexp in styles[key]) {
        if (new RegExp(regexp).test(value)) {
          return styles[key][regexp];
        }
      }
    }
  }
};
var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>, ',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/topograatone/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: '<a href="https://osm.org/">OpenStreetMap contributors</a>',
        url: 'https://overpass-api.de/api/interpreter?data=(node[sport=kitesurfing](58,5,63,13);node["piste:type"=snowkite](58,5,63,13);node["weather:anemometer"](58,5,63,13););out;',
        format: new ol.format.OSMXML()
      }),
      style: pointStyleFunction
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([8.5,59.8]),
    zoom: 7
  })
});
</script>
</body>
</html>
