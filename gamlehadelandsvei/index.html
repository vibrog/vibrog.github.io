<!DOCTYPE html>
<html lang="no">
<head>
<title>Historiske ferdselsveier fra Oslo til Hadeland</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css">
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<style type="text/css">html, body, #map { margin:0; padding:0; width:100%; height:100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/topograatone/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        url: 'pinslie-leting.gpx',
        format: new ol.format.GPX()
      }),
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({color: 'rgba(249,0,37,.9)', width: 1})
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: '<a href="https://osm.org/">OpenStreetMap-bidragsytere</a>,',
        url: 'https://overpass-api.de/api/interpreter?data=relation(id:6701497,3897913,1603624,1782816,1786978,1786979,5316866,6953266,3955929);>;out+skel;',
        format: new ol.format.OSMXML()
      }),
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({color: 'rgba(249,0,37,.5)', width: 5})
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: '<a href="https://www.maridalensvenner.no/arbok-maridalens-venner-2017.5947624-15237.html">Ståle Pinslie</a>',
        url: 'pinslie-turforslag.gpx',
        format: new ol.format.GPX()
      }),
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({color: 'rgb(249,0,37)', width: 5})
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([10.8087,60.0574]),
    zoom: 12
  })
});
</script>
</body>
</html>
