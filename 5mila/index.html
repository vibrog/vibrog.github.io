<!DOCTYPE html>
<html lang="no">
<html>
<head>
<title>Holmenkollen 50 km</title>
<meta name="viewport" content="width=device-width, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" type="text/css">
<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js" type="text/javascript"></script>
<style type="text/css">html, body, #map { margin:0; width:100%; height:100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
var map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        attributions: '<a href="https://kartverket.no/">Kartverket</a>',
        url: 'https://cache.kartverket.no/v1/wmts/1.0.0/toporaster/default/webmercator/{z}/{y}/{x}.png'
      })
    }),
    new ol.layer.Vector({
      source: new ol.source.Vector({
        attributions: 'Vidar B. Gundersen, <a href="https://osm.org/">OpenStreetMap-bidragsytere</a>,',
        url: 'trk.kml',
        format: new ol.format.KML()
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([10.68,59.995]),
    zoom: 13
  })
});
</script>
</body>
</html>
